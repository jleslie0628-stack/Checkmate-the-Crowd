<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkmate the Crowd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #222; color: white; margin: 0; padding: 10px; }
        #lobby { display: flex; flex-direction: column; align-items: center; margin-top: 30px; background: #333; padding: 30px; border-radius: 10px; max-width: 450px; width: 90%; }
        .game-logo { width: 100%; max-width: 350px; height: auto; margin-bottom: 15px; border-radius: 8px; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; width: 100%; max-width: 320px; }
        #joinOneBtn { background-color: #f1f2f6; color: #2f3542; }
        #joinOneBtn:disabled { background-color: #747d8c; cursor: not-allowed; }
        #join100Btn { background-color: #2f3542; color: white; border: 2px solid white; }
        #gameContainer { display: none; text-align: center; width: 100%; max-width: 850px; }
        .game-layout { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; margin-top: 20px; gap: 20px; }
        #board-wrapper { width: 400px; }
        #board { width: 400px; }
        #chat-wrapper { width: 400px; background: #333; border-radius: 5px; padding: 15px; text-align: left; }
        #chat-box { height: 250px; background: #111; border-radius: 3px; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        #chat-input { width: 68%; padding: 8px; border: none; border-radius: 3px; }
        #chat-send { width: 25%; padding: 8px; background: #ffa502; border: none; color: black; font-weight: bold; border-radius: 3px; cursor: pointer; }
        #myRole { font-size: 18px; color: #ffa502; margin-bottom: 5px; font-weight: bold; }
        #resignBtn { background-color: #ff4757; color: white; }
        #restartBtn { background-color: #2ed573; color: white; display: none; }
        @media (max-width: 850px) { .game-layout { flex-direction: column; align-items: center; } #board-wrapper, #chat-wrapper { width: 95vw; max-width: 400px; } }
    </style>
</head>
<body>

    <div id="lobby">
        <img src="Logo.jpg" alt="Checkmate the Crowd Logo" class="game-logo">
        <h2>Choose Your Side</h2>
        <button id="joinOneBtn" class="btn">Play as "The One" (White) 👑</button>
        <button id="join100Btn" class="btn">Join "The 100" (Black) 👥</button>
    </div>

    <div id="gameContainer">
        <h1>Checkmate the Crowd</h1>
        <div id="myRole">Role: Assigning...</div>
        <div id="status" style="font-size: 20px; font-weight: bold;">Waiting for server...</div>
        <div id="timer" style="font-size: 32px; color: #ff4757; font-weight: bold; margin: 10px 0;">30s</div>
        
        <div class="game-layout">
            <div id="board-wrapper">
                <div id="board"></div>
                <div id="voteDisplay" style="margin-top: 15px; color: #aaa; font-family: monospace; font-size: 16px;"></div>
            </div>
            <div id="chat-wrapper">
                <h3 style="margin-top: 0; color: #ffa502;">Hive Mind Chat</h3>
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Discuss tactics...">
                <button id="chat-send">Send</button>
            </div>
        </div>

        <div id="controls-wrapper">
            <button id="resignBtn" class="btn">Vote to Resign</button>
            <div id="resignStatus"></div>
            <button id="restartBtn" class="btn">Restart Match</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let board = Chessboard('board', { draggable: true, position: 'start', onDrop: onDrop });

        // --- Event Listeners ---
        document.getElementById('joinOneBtn').addEventListener('click', () => socket.emit('claimRole', 'theOne'));
        document.getElementById('join100Btn').addEventListener('click', () => socket.emit('claimRole', 'the100'));
        document.getElementById('resignBtn').addEventListener('click', () => socket.emit('voteResign'));
        document.getElementById('restartBtn').addEventListener('click', () => socket.emit('restartGame'));
        document.getElementById('chat-send').addEventListener('click', sendMsg);

        // --- Socket Functions ---
        socket.on('roleStatus', (s) => {
            document.getElementById('joinOneBtn').disabled = s.theOneTaken;
            document.getElementById('joinOneBtn').innerText = s.theOneTaken ? 'The One (Filled)' : 'Play as "The One" (White)';
        });

        socket.on('roleAssigned', (role) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            document.getElementById('myRole').innerText = (role === 'theOne') ? 'Your Role: THE ONE 👑' : 'Your Role: THE 100 👥';
        });

        socket.on('timeUpdate', (s) => document.getElementById('timer').innerText = s + 's');

        socket.on('broadcastChatMessage', (data) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p><strong>${data.role}:</strong> ${data.message}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('gameState', (fen) => {
            board.position(fen);
            const turn = fen.split(' ')[1];
            document.getElementById('status').innerText = (turn === 'w') ? "White's Turn (The One) 👑" : "Black's Turn (The 100 Voting...) 👥";
        });

        socket.on('voteUpdate', (votes) => {
            const display = document.getElementById('voteDisplay');
            display.innerHTML = Object.keys(votes).length ? Object.keys(votes).map(m => `• ${m}: ${votes[m]} vote(s)`).join('<br>') : "No votes cast yet.";
        });

        socket.on('gameOver', () => document.getElementById('restartBtn').style.display = 'inline-block');

        // --- Helpers ---
        function onDrop(source, target) {
            socket.emit('submitMove', { from: source, to: target });
            return 'snapback';
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                socket.emit('sendChatMessage', input.value.trim());
                input.value = '';
            }
        }
    </script>
</body>
</html>
