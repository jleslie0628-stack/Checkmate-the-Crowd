<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkmate the Crowd</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: white; margin: 0; padding: 20px; text-align: center; user-select: none; overscroll-behavior: none; }
        #gameContainer { display: none; margin-top: 20px; }
        .game-layout { display: flex; flex-direction: row; justify-content: center; gap: 20px; }
        #board { width: 400px; touch-action: none; }
        #chat-wrapper { width: 300px; background: #333; padding: 15px; border-radius: 5px; text-align: left; }
        #chat-box { height: 300px; background: #111; overflow-y: auto; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #resignBtn { background: #ff4757; color: white; }
        #restartBtn { background: #2ed573; color: white; display: none; }
        
        @media (max-width: 850px) {
            .game-layout { flex-direction: column; align-items: center; }
            #board { width: 95vw; height: 95vw; }
            #chat-wrapper { width: 95vw; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Checkmate the Crowd</h1>
        <button id="joinOneBtn" class="btn">Play as The One</button>
        <button id="join100Btn" class="btn">Play as The 100</button>
    </div>

    <div id="gameContainer">
        <div id="myRole"></div>
        <div class="game-layout">
            <div id="board-wrapper"><div id="board"></div></div>
            <div id="chat-wrapper">
                <div id="chat-box"></div>
                <input id="chat-input" placeholder="Type a message...">
                <button id="chat-send">Send</button>
            </div>
        </div>
        <div id="controls" style="margin-top:15px;">
            <button id="resignBtn" class="btn">Vote to Resign</button>
            <div id="resignStatus"></div>
            <button id="restartBtn" class="btn">Restart Match</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        // [Add your existing chessboard.js / socket logic here]
        
        // Handle Resign UI
        document.getElementById('resignBtn').addEventListener('click', () => socket.emit('voteResign'));
        document.getElementById('restartBtn').addEventListener('click', () => socket.emit('restartGame'));

        socket.on('resignProgress', (data) => {
            document.getElementById('resignStatus').innerText = `Resign votes: ${data.count}/${data.needed}`;
        });

        socket.on('gameOver', () => {
            document.getElementById('restartBtn').style.display = 'inline-block';
        });

        socket.on('gameState', (fen) => {
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('resignStatus').innerText = '';
            // Refresh board...
        });

        // Chat System with Referee Color
        socket.on('broadcastChatMessage', (data) => {
            const chatBox = document.getElementById('chat-box');
            let color = (data.role === 'Game System') ? '#ff4757' : '#ffa502';
            chatBox.innerHTML += `<p><strong>${data.role}:</strong> ${data.message}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
