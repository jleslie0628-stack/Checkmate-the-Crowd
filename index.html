<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        #gameContainer { display: none; margin-top: 20px; }
        #board { width: 400px; margin: 0 auto; }
        #chat-wrapper { width: 300px; background: #333; padding: 15px; margin: 0 auto; }
        #chat-box { height: 200px; overflow-y: auto; background: #111; margin-bottom: 10px; }
        #timerDisplay { font-size: 24px; color: #f1c40f; margin: 10px; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Checkmate the Crowd</h1>
        <button onclick="socket.emit('claimRole', 'theOne')">Play as The One</button>
        <button onclick="socket.emit('claimRole', 'the100')">Play as The 100</button>
    </div>

    <div id="gameContainer">
        <h2 id="myRole"></h2>
        <div id="timerDisplay">Time: 30</div>
        <div id="board"></div>
        <div id="chat-wrapper">
            <div id="chat-box"></div>
            <input id="chat-input" placeholder="Message...">
            <button id="chat-send">Send</button>
        </div>
        <button id="resignBtn">Vote to Resign</button>
        <div id="resignStatus"></div>
        <button id="restartBtn" style="display:none">Restart Match</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script>
        const socket = io();
        let board = null;

        socket.on('roleAssigned', (role) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            if (role === 'theOne') {
                document.getElementById('chat-input').style.display = 'none';
                document.getElementById('chat-send').style.display = 'none';
            }
            board = Chessboard('board', { draggable: true, position: 'start', onDrop: (s, t) => {
                socket.emit('submitMove', { from: s, to: t });
                return 'trash';
            }});
        });

        socket.on('timeUpdate', (t) => { if(document.getElementById('timerDisplay')) document.getElementById('timerDisplay').innerText = `Time: ${t}`; });
        socket.on('gameState', (fen) => { if(board) board.position(fen); });
        socket.on('broadcastChatMessage', (d) => {
            document.getElementById('chat-box').innerHTML += `<p><strong>${d.role}:</strong> ${d.message}</p>`;
        });

        document.getElementById('chat-send').onclick = () => {
            socket.emit('sendChatMessage', document.getElementById('chat-input').value);
            document.getElementById('chat-input').value = '';
        };

        socket.on('gameOver', () => document.getElementById('restartBtn').style.display = 'inline-block');
        socket.on('restartGame', () => document.getElementById('restartBtn').style.display = 'none');
        document.getElementById('resignBtn').onclick = () => socket.emit('voteResign');
        document.getElementById('restartBtn').onclick = () => socket.emit('restartGame');
    </script>
</body>
</html>
